name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff mypy pip-audit
      - name: Compile
        run: python -m compileall persistent_memory_mcp src
      - name: Lint
        run: ruff check persistent_memory_mcp src tests
      - name: Type check product CLI
        run: mypy --config-file=/dev/null --ignore-missing-imports persistent_memory_mcp
      - name: Tests
        run: pytest -q
      - name: Dependency audit
        run: pip-audit
