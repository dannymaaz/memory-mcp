name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio ruff
      - name: Verify package metadata
        run: |
          python -c "import sys; assert sys.version_info >= (3, 11)"
          python -c "from importlib.metadata import requires; assert requires('persistent-memory-mcp') is not None"
      - name: Compile
        run: python -m compileall persistent_memory_mcp src
      - name: Lint
        run: ruff check persistent_memory_mcp src tests
      - name: Tests
        run: pytest -q

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit
      - name: Audit dependencies
        run: pip-audit --skip-editable
